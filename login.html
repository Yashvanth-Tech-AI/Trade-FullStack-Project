<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IITStockMarket - Login</title>
    <link rel="stylesheet" href="login_style.css">
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="Images/logo.png" alt="IITStockMarket Logo">
            <div class="brand">IITStockMarket.com</div>
        </div>
        <div class="tagline">Earn Success Everyday!</div>
        
        <div class="promo-message">
            As we are reaching 5 years, our company is offering extra 5% bonus for all fresh investments
        </div>
        
        <form id="loginForm" method="POST" action="/api/login">
            <div class="form-group">
                <div class="input-wrapper">
                    <select name="loginAs" id="loginAs" required>
                        <option value="">Login As</option>
                        <option value="investor">Investor</option>
                        <option value="trader">Trader</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="text" name="username" id="loginCode" placeholder="Username/Login Code" required>
                </div>
            </div>
            
            <div class="form-group">
                <div class="input-wrapper password-wrapper">
                    <input type="password" name="password" id="password" placeholder="Password" required>
                    <span class="toggle-password" id="togglePassword">👁</span>
                </div>
            </div>
            
            <button type="submit" class="login-button">Log In</button>
        </form>
        
        <div class="signup-text">
            Don't have an account? <a href="Home.html">Contact Us</a>
        </div>
    </div>

    <!-- Script at the bottom for better page load performance -->
    <script src="login_script.js"></script>
</body>
</html>
